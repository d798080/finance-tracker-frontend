<h2>Add Transaction</h2>

<div class="mb-3">
  <label class="form-label">Description</label>
  <input class="form-control" [formControl]="descriptionControl" />
</div>

<div class="mb-3">
  <label class="form-label">Amount</label>
  <input class="form-control" type="number" step="0.01" [formControl]="amountControl" />
</div>

<div class="mb-3">
  <label class="form-label">Type</label>
  <select class="form-select" [formControl]="typeControl">
    <option value="EXPENSE">EXPENSE</option>
    <option value="INCOME">INCOME</option>
  </select>
</div>

<div class="mb-3">
  <label class="form-label">Date</label>
  <input class="form-control" type="date" [formControl]="dateControl" />
</div>

<div class="mb-3">
  <label class="form-label">Category</label>
  <select class="form-select" [formControl]="categoryControl">
    @for (c of categories; track $index) {
      <option [value]="c.id">{{ c.name }}</option>
    }
  </select>
</div>

<div class="d-flex gap-2">
  <button class="btn btn-secondary" type="button" (click)="goBack()">Cancel</button>
  <button class="btn btn-success" type="button" (click)="onSubmit()">Save</button>
</div>
